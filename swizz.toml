# swizz.toml — Unity Game of Life project.
# Inherits the embedded "unity" profile (extends "default"), which
# wires the game-architect plugin in for the Architect slot and
# declares the unity-editor MCP connector pointing at the akiojin
# unity-mcp-server npm package.

[profile]
# Project-local profile under .swizz/profiles/unity-local.toml; it
# extends the embedded "unity" and overrides [mcp.unity-editor] to
# point at this project's auto-extracted MCP server binary path.
name = "unity-local"

[project]
name = "swizz-unity"
version = "0.1.0"
target_language = "csharp"
# Unity tests run inside the Editor via the MCP test.run capability,
# so swizz's test runner is left empty — the profile's pipeline
# test_command ("dotnet test") is what fires today; that's a known
# mismatch that the unity-qa plugin will address once its pipeline
# wiring lands.
test_command = ""

[model]
# Switched off Ollama because CUDA 13.2 (host driver) produces
# gibberish output with qwen3.6 GGUFs under Ollama's bundled CUDA
# runtime. Now using llama-server directly. Start it yourself
# before `swizz run`:
#
#   ~/start-llama-server.sh
#
# That script (tracked in the swizz repo at scripts/start-llama-server.sh,
# symlinked from ~/) launches the upstream prebuilt Linux Vulkan
# llama-server on 127.0.0.1:11435 with the qwen3.6-27b-q3_K_M GGUF,
# gpu_layers / ctx / cache-type tuned for 12 GB VRAM. Edit the
# variables at the top of the script to tune.
#
# Vulkan instead of CUDA because llama.cpp doesn't ship Linux+CUDA
# prebuilts (Windows only), and a nix-built CUDA binary would need
# nixGL to bridge nix's glibc against the host's libcuda — nixGL's
# auto-detect regex doesn't match the NVIDIA Open Kernel Module
# banner this host runs, so the wrapper fails to evaluate. The
# Vulkan binary links against host glibc throughout and talks to
# NVIDIA's Vulkan ICD directly, so there's no glibc collision and
# no toolchain install required.
#
# Per-agent gpu_split / num_ctx in unity-local.toml are ADVISORY
# under llamacpp — llama-server reads those from the CLI flags above
# at launch and silently ignores per-request overrides. default_model
# is informational too (whatever you load via -m wins).
provider = "llamacpp"
endpoint = "http://localhost:11435"
default_model = "qwen3.6:27B"
gpu_split = 0.45
num_ctx = 16384
num_predict = 4096
temperature = 0.15
top_p = 0.9
stream = true
stream_mode = "summary"
keep_alive = "30m"
think = false

[git]
enabled = true
main_branch = "main"
develop_branch = "develop"
feature_prefix = "feature"
safety_test_before_main = false  # no dotnet test runner wired in MVP

[unity]
# Editor is user-managed (you open Unity yourself before swizz run
# and keep it open across runs — matches normal Unity dev workflow).
# editor_command is left empty so swizz's launcher is a no-op.
#
# IMPORTANT one-time setup inside Unity:
#   Window → AI Game Developer → click "Stop" on the MCP server.
# That sets KeepServerRunning=false in the package config, so Unity
# stops auto-spawning its own MCP server on port 23118 every time
# the Editor opens — otherwise it competes with the binary swizz
# spawns via [mcp.unity-editor] in .swizz/profiles/unity-local.toml.
editor_command = ""
project_path   = "/home/ems/RiderProjects/swizz-unity/unity-project"

[agents.artist]
# 2D sprite art via ComfyUI. Lazily spawned when an artist task fires;
# the launcher we added in c5f2796 reaps it at run end.
backend                = "comfyui"
endpoint               = "http://localhost:8188"
workflow               = ".swizz/workflows/sd15-simple.json"
polling_interval_ms    = 500
launch_command         = "/home/ems/ComfyUI/venv/bin/python"
launch_args            = ["main.py"]
launch_dir             = "/home/ems/ComfyUI"
launch_timeout_seconds = 60

[cloud]
# Local-first with cloud as fallback. Swizz uses the local Qwen
# model for every agent call; only escalates to Claude on context
# overflow or when an agent self-reports {status: "escalate"}.
# Flip `always = true` if you want every call routed via the cloud
# provider regardless.
enabled          = true
always           = false
provider         = "anthropic"
require_approval = false

[cloud.anthropic]
api_key_env     = "ANTHROPIC_API_KEY"
model           = "claude-opus-4-7"
max_tokens      = 32768
timeout_seconds = 120
