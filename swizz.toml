# swizz.toml — Unity Game of Life project.
# Inherits the embedded "unity" profile (extends "default"), which
# wires the game-architect plugin in for the Architect slot and
# declares the unity-editor MCP connector pointing at the akiojin
# unity-mcp-server npm package.

[profile]
# Project-local profile under .swizz/profiles/unity-local.toml; it
# extends the embedded "unity" and overrides [mcp.unity-editor] to
# point at this project's auto-extracted MCP server binary path.
name = "unity-local"

[project]
name = "swizz-unity"
version = "0.1.0"
target_language = "csharp"
# Unity tests run inside the Editor via the MCP test.run capability,
# so swizz's test runner is left empty — the profile's pipeline
# test_command ("dotnet test") is what fires today; that's a known
# mismatch that the unity-qa plugin will address once its pipeline
# wiring lands.
test_command = ""

[model]
# Switched off Ollama because CUDA 13.2 (host driver) produces
# gibberish output with qwen3.6 GGUFs under Ollama's bundled CUDA
# runtime. Now using llama-server directly. Swizz spawns and reaps
# the server itself via [model.launch] below — DO NOT pre-start
# ~/start-llama-server.sh manually. If you do, swizz can't stop the
# server it didn't spawn, so the artist phase (ComfyUI) will OOM on
# the 12 GB GPU when both want VRAM. `swizz doctor` warns if it
# detects a pre-started server.
#
# scripts/start-llama-server.sh launches the upstream prebuilt Linux
# Vulkan llama-server on 127.0.0.1:11435 with the qwen3.6-27b-q3_K_M
# GGUF, gpu_layers / ctx / cache-type tuned for 12 GB VRAM. Vulkan
# instead of CUDA because llama.cpp doesn't ship Linux+CUDA prebuilts
# and the nix-built CUDA binary needed nixGL, which doesn't recognise
# the NVIDIA Open Kernel Module banner this host runs.
#
# Per-agent gpu_split / num_ctx in unity-local.toml are ADVISORY
# under llamacpp — llama-server reads those from the CLI flags above
# at launch and silently ignores per-request overrides. default_model
# is informational too (whatever you load via -m wins).
provider = "llamacpp"
endpoint = "http://localhost:11435"
default_model = "qwen3.6:27B"
gpu_split = 0.45
num_ctx = 32768
num_predict = 4096
temperature = 0.15
top_p = 0.9
stream = true
stream_mode = "summary"
keep_alive = "30m"
think = false

[model.launch]
# DISABLED for the all-codex run: with [cloud].always = true every agent
# call goes to codex, so the local llama-server is never used for
# inference. Spawning it would just hold ~10 GB of VRAM and force a
# pointless evict/restart GPU-swap around the ComfyUI artist phase. With
# this commented out swizz never starts llama-server, and ComfyUI gets
# the full 12 GB GPU for art (no swap). `swizz doctor` will still show
# `✗ llamacpp unreachable` — harmless under always-cloud (the endpoint is
# never called). Re-enable both lines to go back to local-model runs.
#
# command         = "/home/ems/start-llama-server.sh"
# timeout_seconds = 90  # cold model load on a 27B Q3_K_M GGUF can take ~30-60s

[git]
enabled = true
main_branch = "main"
develop_branch = "develop"
feature_prefix = "feature"
safety_test_before_main = false  # no dotnet test runner wired in MVP

[unity]
# Editor is user-managed (you open Unity yourself before swizz run
# and keep it open across runs — matches normal Unity dev workflow).
# editor_command is left empty so swizz's launcher is a no-op.
#
# IMPORTANT one-time setup inside Unity:
#   Window → AI Game Developer → click "Stop" on the MCP server.
# That sets KeepServerRunning=false in the package config, so Unity
# stops auto-spawning its own MCP server on port 23118 every time
# the Editor opens — otherwise it competes with the binary swizz
# spawns via [mcp.unity-editor] in .swizz/profiles/unity-local.toml.
editor_command = ""
project_path   = "/home/ems/RiderProjects/swizz-unity/unity-project"

[agents.artist]
# 2D sprite art via ComfyUI. Lazily spawned when an artist task fires;
# the launcher we added in c5f2796 reaps it at run end.
backend                = "comfyui"
endpoint               = "http://localhost:8188"
workflow               = ".swizz/workflows/sd15-simple.json"
polling_interval_ms    = 500
launch_command         = "/home/ems/ComfyUI/venv/bin/python"
launch_args            = ["main.py"]
launch_dir             = "/home/ems/ComfyUI"
launch_timeout_seconds = 60

[cloud]
# Force EVERY agent call through DeepSeek's OpenAI-compatible API
# (provider="deepseek", direct per-token billing on an API key).
# always=true routes all steps to DeepSeek — including the Artist's
# Phase-1 prompt generation; only the Phase-2 image render (ComfyUI, see
# [agents.artist]) stays local, since image generation never goes to the
# text provider. require_approval=false so the run is unattended
# end-to-end (otherwise every single call would prompt).
#   Export DEEPSEEK_API_KEY in the environment of the swizz-node that
#   runs this workspace (the node launches swizz as a subprocess that
#   inherits it); an empty key is a hard error at run start.
enabled          = true
always           = true
provider         = "deepseek"
require_approval = false

[cloud.deepseek]
# DeepSeek's OpenAI-compatible API (direct, per-token). Key read from
# this env var at runtime. deepseek-v4-pro is the larger V4 model (1M
# context, 384K max output, thinking on by default; supports JSON mode
# for structured agent output). max_tokens (32768) is well under the
# 384K ceiling — raise it if large architect/engineer outputs truncate.
# Cheaper alternative: deepseek-v4-flash (~3x lower output cost).
api_key_env     = "DEEPSEEK_API_KEY"
model           = "deepseek-v4-pro"
base_url        = ""
max_tokens      = 32768
timeout_seconds = 600
