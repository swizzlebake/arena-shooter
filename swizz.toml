# swizz.toml — Unity Game of Life project.
# Inherits the embedded "unity" profile (extends "default"), which
# wires the game-architect plugin in for the Architect slot and
# declares the unity-editor MCP connector pointing at the akiojin
# unity-mcp-server npm package.

[profile]
# Project-local profile under .swizz/profiles/unity-local.toml; it
# extends the embedded "unity" and overrides [mcp.unity-editor] to
# point at this project's auto-extracted MCP server binary path.
name = "unity-local"

[project]
name = "swizz-unity"
version = "0.1.0"
target_language = "csharp"
# Unity tests run inside the Editor via the MCP test.run capability,
# so swizz's test runner is left empty — the profile's pipeline
# test_command ("dotnet test") is what fires today; that's a known
# mismatch that the unity-qa plugin will address once its pipeline
# wiring lands.
test_command = ""

[model]
# Inference runs on the Mac Studio (emsmac.local, 64 GB) via LM Studio's
# OpenAI-compatible server (MLX runtime) — the SAME backend as swizz-unity-2.
# This workspace was moved off its local 12 GB llama-server (qwen3.6-27b Q3)
# onto the Mac. The WHOLE pipeline now runs one model — qwen3.6-27b-ud-mlx — so
# there is NO per-agent model swap: the prior split (35b-a3b for most agents,
# 27b only for the editor-engineer) forced an LM Studio JIT model reload around
# the wiring step, and that single-model-at-a-time swap returned an HTTP 500
# mid-run and aborted the task. One model everywhere = no swap, no swap-500.
# Load qwen3.6-27b-ud-mlx in LM Studio's Developer / Local Server tab at the
# 65536 context below, "Serve on Local Network", Start Server; confirm the id
# with: curl http://emsmac.local:1234/v1/models
#
# IMPORTANT: the Mac serves ONE model at a time — do NOT run swizz-unity and
# swizz-unity-2 against it concurrently; a second run contends for the single
# loaded model. The two are also both on Unity-MCP port 23118, so keep only
# ONE project's Editor open at a time or a run can bind the neighbour's Editor.
#
# To revert to the local 12 GB llama-server: restore provider="llamacpp",
# endpoint="http://localhost:11435", default_model="qwen3.6:27B", gpu_split=0.45,
# num_ctx=32768, num_predict=4096, drop tool_mode/stall_timeout, and re-enable
# [model.launch] below.
provider = "openai"
endpoint = "http://emsmac.local:1234"
default_model = "qwen3.6-27b-ud-mlx"
gpu_split = 1.0
# num_ctx=65536 / num_predict=32768 matched to swizz-unity-2: the overflow guard
# thresholds the prompt against (num_ctx - num_predict), so num_ctx must stay
# well above num_predict or it mass-escalates to cloud. Load the LM Studio model
# at this SAME 65536 context and pin it (65536 is half the 131072 that swapped
# the 64 GB Mac — verify tok/s on the first run).
num_ctx = 65536
num_predict = 32768
temperature = 0.15
top_p = 0.9
stream = true
stream_mode = "summary"
keep_alive = "30m"
think = false
# Native tool-calling: the openai backend forwards MCP tools on the API's native
# `tools` array (engages for MCP-capable agents running locally; cloud-escalated
# turns fall back to the prompt path). Needs a swizz binary >= 7287ec2.
tool_mode = "native"
# No-token stall watchdog (seconds): aborts + restarts a wedged stream once, then
# fails clearly. 300 sits above worst-case prefill on a near-full 65536 context.
stall_timeout_seconds = 300

[model.launch]
# DISABLED for the all-codex run: with [cloud].always = true every agent
# call goes to codex, so the local llama-server is never used for
# inference. Spawning it would just hold ~10 GB of VRAM and force a
# pointless evict/restart GPU-swap around the ComfyUI artist phase. With
# this commented out swizz never starts llama-server, and ComfyUI gets
# the full 12 GB GPU for art (no swap). `swizz doctor` will still show
# `✗ llamacpp unreachable` — harmless under always-cloud (the endpoint is
# never called). Re-enable both lines to go back to local-model runs.
#
# command         = "/home/ems/start-llama-server.sh"
# timeout_seconds = 90  # cold model load on a 27B Q3_K_M GGUF can take ~30-60s

[git]
enabled = true
main_branch = "main"
develop_branch = "develop"
feature_prefix = "feature"
safety_test_before_main = false  # no dotnet test runner wired in MVP

[unity]
# Auto-launch mode (editor_ready_probe = "lockfile"): swizz launches the
# Editor at run start if it isn't already open, and reuses a warm one
# otherwise — "already open" is detected via unity-project/Temp/UnityLockfile,
# since the IvanMurzak package dials OUT to swizz's MCP server (nothing
# listens on readiness_port to probe). -accept-apiupdate pre-empts the
# API-updater "upgrade scripts?" modal, which otherwise blocks the Editor
# main thread and null-responds every MCP tool call. close_editor_after_run
# defaults false -> the Editor stays warm between runs. Blank editor_command
# to go back to manual-Editor mode.
#
# IMPORTANT one-time setup inside Unity (still required under auto-launch):
#   Window → AI Game Developer → click "Stop" on the MCP server.
# That sets KeepServerRunning=false in the package config, so Unity stops
# auto-spawning its own MCP server on port 23118 every time the Editor opens
# — otherwise it competes with the binary swizz spawns via [mcp.unity-editor]
# in .swizz/profiles/unity-local.toml, and the Editor plugin may attach to
# Unity's server instead of swizz's (every swizz tool call then returns
# "Response data is null").
editor_command         = "/home/ems/Unity/Hub/Editor/6000.3.10f1/Editor/Unity"
editor_args            = ["-accept-apiupdate"]  # -projectPath is auto-added
project_path           = "/home/ems/RiderProjects/swizz-unity/unity-project"
launch_timeout_seconds = 240                    # cold boot + first import headroom
readiness_port         = 23118                  # ignored in lockfile mode
editor_ready_probe     = "lockfile"
# close_editor_after_run defaults false -> Editor stays warm between runs

[agents.artist]
# 2D sprite art via ComfyUI. Lazily spawned when an artist task fires;
# the launcher we added in c5f2796 reaps it at run end.
backend                = "comfyui"
endpoint               = "http://localhost:8188"
workflow               = ".swizz/workflows/sd15-simple.json"
polling_interval_ms    = 500
launch_command         = "/home/ems/ComfyUI/venv/bin/python"
launch_args            = ["main.py"]
launch_dir             = "/home/ems/ComfyUI"
launch_timeout_seconds = 60

[cloud]
# Escalation-FALLBACK mode (enabled=true, always=false) — matches
# swizz-unity-2. Cloud (DeepSeek) fires ONLY when an agent self-reports
# status=escalate or a prompt overflows the context budget; the whole
# pipeline otherwise runs on the local Mac model above. (Was always=true =
# every call to DeepSeek; flipped when this workspace moved to the Mac so it
# runs local-first like swizz-unity-2.) require_approval=false keeps the run
# unattended.
#   DEEPSEEK_API_KEY must still be exported in the swizz-node env for the
#   fallback path; with always=false an empty key only errors if escalation
#   actually fires (a prompt overflow / self-reported escalate).
enabled          = true
always           = false
provider         = "deepseek"
require_approval = false

[cloud.deepseek]
# DeepSeek's OpenAI-compatible API (direct, per-token). Key read from
# this env var at runtime. deepseek-v4-pro is the larger V4 model (1M
# context, 384K max output, thinking on by default; supports JSON mode
# for structured agent output). max_tokens (32768) is well under the
# 384K ceiling — raise it if large architect/engineer outputs truncate.
# Cheaper alternative: deepseek-v4-flash (~3x lower output cost).
api_key_env     = "DEEPSEEK_API_KEY"
model           = "deepseek-v4-pro"
base_url        = ""
max_tokens      = 32768
timeout_seconds = 600
