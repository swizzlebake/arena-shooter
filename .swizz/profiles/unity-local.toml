# Project-local profile that extends the embedded "unity" profile and
# overrides [mcp.unity-editor] to point at this project's
# auto-extracted Unity-MCP server binary. IvanMurzak's package writes
# this binary to {project}/Library/mcp-server/{platform}/ on first
# Editor launch after running "Window → AI Game Developer →
# Auto-generate skills".

[profile]
name = "unity-local"
display_name = "Unity Game Dev (swizz-unity local)"
description = "swizz-unity project-local Unity profile (binary path override)."
version = "0.1.0"
extends = "unity"

# Override every per-agent model from the embedded unity profile (which
# pins qwen2.5-coder:14b/7b) so the whole pipeline runs on ONE Mac model —
# qwen3.6-27b-ud-mlx, matching [model].default_model. Every agent is on the
# SAME model on purpose: the Mac serves one model at a time, so any per-agent
# model that differs from [model].default_model forces an LM Studio JIT reload
# mid-run — that swap returned an HTTP 500 around the wiring step and aborted
# the task (m7). Keep all these in lockstep with [model].default_model; if you
# change the global model, change these too (or delete them to inherit).
# num_ctx=65536 is kept in lockstep with [model].num_ctx (it drives the
# per-agent cloud-escalation threshold); gpu_split=1.0 is advisory under the
# openai/LM Studio backend. pm/uiux/artist aren't listed — they inherit
# [model].default_model, which is already the 27b.
[agents.architect]
plugin = "game-architect"
model = "qwen3.6-27b-ud-mlx"
num_ctx = 65536
gpu_split = 1.0

[agents.engineer]
model = "qwen3.6-27b-ud-mlx"
num_ctx = 65536
gpu_split = 1.0

[agents.qa]
model = "qwen3.6-27b-ud-mlx"
num_ctx = 65536
gpu_split = 1.0

[agents.unity-editor-engineer]
plugin = "unity-editor-engineer"
# The 27b (Unsloth Dynamic quant) is now the model for the WHOLE pipeline, so
# the wiring step no longer swaps models. We picked the 27b for wiring because
# the 35b-a3b kept hand-writing script-execute with hallucinated APIs instead
# of emitting the declarative wiring_plan; making it the global model removes
# the JIT swap that 500'd. Load qwen3.6-27b-ud-mlx with context >= num_ctx
# below or big prompts 400.
model = "qwen3.6-27b-ud-mlx"
num_ctx = 65536
gpu_split = 1.0

[agents.shader-engineer]
plugin = "shader-engineer"
model = "qwen3.6-27b-ud-mlx"
num_ctx = 65536
gpu_split = 1.0

[agents.unity-qa]
plugin = "unity-qa"
model = "qwen3.6-27b-ud-mlx"
num_ctx = 65536
gpu_split = 1.0

[mcp.unity-editor]
# com.ivanmurzak.unity.mcp 0.81.0 rebranded the project to the
# engine-agnostic "GameDev-MCP-Server" and renamed the extracted binary
# unity-mcp-server -> gamedev-mcp-server (server internals now 8.0.0).
# Same CLI surface: --port / --client-transport still work.
server = "/home/ems/RiderProjects/swizz-unity/unity-project/Library/mcp-server/linux-x64/gamedev-mcp-server"
# --port is the SignalR hub port the Editor's in-package client
# connects to (Unity logs "endpoint: /hub/mcp-server" pointing at
# this port). --client-transport=stdio means the server speaks MCP
# over stdio to swizz (the other half of its job). Both ends must
# agree on the port; 23118 is IvanMurzak's default.
args = ["--port=23118", "--client-transport=stdio"]
auto_start = true
capabilities = [
  "scene.read", "scene.write",
  "prefab.read", "prefab.write",
  "playmode.enter", "playmode.exit",
  "console.read", "test.run",
  "asset.import", "asset.refresh",
  "compilation.check",
]
auto_approve_writes = false

# Make the pre-merge compile gate fail CLOSED for this project. The unity
# profile configures the gate (assets-refresh against the Editor) but leaves
# require=false, so when the MCP bridge is momentarily down — or a real
# compile error trips only the generic "errors exist" signal the console
# can't confirm — it degrades to a warning and MERGES anyway. That fail-open
# is exactly how missing asmdefs / a dropped ugui package / an invalid API
# call reached develop uncompilable: QA here is static-analysis only and
# never compiles. require=true blocks the merge instead — never merge what
# can't be proven to compile. A blocked merge archives the WIP and is
# recoverable; a silent broken merge is not. Safe under our auto-launch +
# bridge gate, which already guarantees the Editor is attached during a run,
# so assets-refresh can always return an authoritative compile verdict.
#
# NB: CompileCheck replaces WHOLESALE down the extends chain (pointer, not a
# per-field merge — loader.go), so this repeats the unity profile's block
# verbatim and only adds require=true. Keep in sync with
# internal/profile/embedded/unity.toml's [pipeline.compile_check].
[pipeline.compile_check]
connector = "unity-editor"
tool = "assets-refresh"
refresh_after_apply = true
clear_tool = "console-clear-logs"
require = true
